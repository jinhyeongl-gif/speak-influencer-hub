              <button className="btn btn-secondary" onClick={() => setDetailPage(p => Math.min(totalPages - 1, p + 1))}
                disabled={detailPage === totalPages - 1} style={{ fontSize: 12, padding: '6px 12px', opacity: detailPage === totalPages - 1 ? 0.35 : 1 }}>다음 ›</button>
              <button className="btn btn-secondary" onClick={() => setDetailPage(totalPages - 1)}
                disabled={detailPage === totalPages - 1} style={{ fontSize: 13, padding: '6px 10px', opacity: detailPage === totalPages - 1 ? 0.35 : 1, fontWeight: 700 }}>»</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ── 칸반 메인 뷰 ── */
  return (
    <div style={{ padding: 28 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 2 }}>
        <div className="section-title">ReachOut</div>
        {fCampaign && (
          <span style={{ background: '#fff7ed', border: '1px solid #fed7aa', borderRadius: 20,
            padding: '3px 12px', fontSize: 12, color: '#ea580c', fontWeight: 700 }}>
            📌 {campaigns.find(c => c.id === fCampaign)?.name}
          </span>
        )}
      </div>
      <div className="section-sub">Selected 인플루언서 컨택 현황 — 총 {pool.length}명</div>
      <div className="filter-bar" style={{ marginBottom: 20 }}>
        <input placeholder="🔍 채널명 검색" value={search} onChange={e => setSearch(e.target.value)} />
        <select value={fPlatform} onChange={e => setFPlatform(e.target.value)}>
          <option value="">전체 플랫폼</option>
          {Object.entries(PLATFORMS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <select value={fCategory} onChange={e => setFCategory(e.target.value)}>
          <option value="">전체 카테고리</option>
          {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        {/* 캠페인 필터 */}
        <select value={fCampaign} onChange={e => setFCampaign(e.target.value)}
          style={{ minWidth: 140, borderColor: fCampaign ? '#F97316' : undefined,
            color: fCampaign ? '#F97316' : undefined, fontWeight: fCampaign ? 600 : 400 }}>
          <option value="">전체 캠페인</option>
          {(campaigns || []).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        {fCampaign && (
          <button onClick={() => setFCampaign('')}
            style={{ fontSize: 11, padding: '4px 9px', borderRadius: 7, border: '1px solid #fed7aa',
              background: '#fff7ed', color: '#ea580c', cursor: 'pointer', fontWeight: 600 }}>
            ✕ 캠페인 해제
          </button>
        )}
        {/* 스테이지별 카운트 — 클릭 시 상세 뷰로 이동 */}
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {OUTREACH_STAGES.map(s => { const { bg, color } = sc(s); return (
            <button key={s} onClick={() => { setDetailStage(s); setDetailSearch(''); setDetailPage(0); }}
              style={{ background: bg, color, padding: '4px 10px', borderRadius: 10, fontSize: 11,
                fontWeight: 600, border: 'none', cursor: 'pointer',
                transition: 'opacity 0.15s', opacity: 1 }}
              onMouseEnter={e => e.currentTarget.style.opacity = '0.75'}
              onMouseLeave={e => e.currentTarget.style.opacity = '1'}>
              {s}: {byStage[s].length}
            </button>
          ); })}
        </div>
      </div>

      {/* 칸반 — 컬럼 고정 높이 + 내부 스크롤 */}
      <div style={{ display: 'flex', gap: 12, overflowX: 'auto', paddingBottom: 16 }}>
        {OUTREACH_STAGES.map(stage => {
          const cards = byStage[stage];
          const { bg, color } = sc(stage);
          return (
            <div key={stage} className="kanban-col" style={{ display: 'flex', flexDirection: 'column' }}>
              {/* 컬럼 헤더 — 클릭 시 상세 뷰 */}
              <button
                onClick={() => { setDetailStage(stage); setDetailSearch(''); setDetailPage(0); }}
                style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                  marginBottom: 12, background: 'none', border: 'none', cursor: 'pointer', padding: 0,
                  width: '100%' }}>
                <span style={{ background: bg, color, padding: '4px 10px', borderRadius: 8, fontSize: 11, fontWeight: 600 }}>{stage}</span>
                <span style={{ background: '#f1f5f9', color: '#64748b', padding: '2px 8px', borderRadius: 8, fontSize: 11, fontWeight: 600 }}>{cards.length}</span>
              </button>
              {/* 카드 영역 — 고정 높이 + 스크롤 */}
              <div style={{ overflowY: 'auto', maxHeight: 'calc(100vh - 340px)', paddingRight: 2 }}>
                {cards.length === 0 && <div style={{ fontSize: 11, color: '#cbd5e1', textAlign: 'center', padding: '16px 0' }}>없음</div>}
                {cards.map(inf => (
                  <div key={inf.id} className="kanban-card">
                    <div style={{ fontWeight: 500, fontSize: 13, marginBottom: 5 }}>{inf.channelName}</div>
                    <div style={{ display: 'flex', gap: 4, marginBottom: 7, flexWrap: 'wrap' }}>
                      <PBadge platform={inf.platform} />
                      <span style={{ fontSize: 10, color: '#94a3b8', alignSelf: 'center' }}>{inf.category}</span>
                    </div>
                    <div style={{ fontSize: 11, color: '#94a3b8', marginBottom: 8 }}>
                      👥 {fmt(inf.followers)} · 👁 {fmt(inf.avgViews)}
                    </div>
                    {inf.contactEmail && <div style={{ fontSize: 11, color: '#64748b', marginBottom: 8, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>✉ {inf.contactEmail}</div>}
                    <StageSelect value={inf.outreachStatus} options={OUTREACH_STAGES} onChange={v => updateInf(inf.id, { outreachStatus: v })} />
                    <input value={inf.outreachNote || ''} onChange={e => updateInf(inf.id, { outreachNote: e.target.value })} placeholder="메모" style={{ width: '100%', marginTop: 6, fontSize: 11, padding: '4px 8px' }} />
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* ── 구분선 ── */}
      <div style={{ borderTop: '2px solid #e5e7eb', margin: '32px 0 28px' }} />

      {/* ── 아웃리치 자동화 섹션 ── */}
      <div className="section-title" style={{ fontSize: 17 }}>✉️ 아웃리치 자동화</div>
      <div className="section-sub">인플루언서별 맞춤 이메일 템플릿을 생성하고 Gmail로 전송합니다.</div>

      <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 20 }}>
        {/* 왼쪽: 설정 */}
        <div>
          <div className="card" style={{ padding: 16, marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: '#374151' }}>📝 템플릿 선택</div>
              <div style={{ display: 'flex', gap: 4 }}>
                <button onClick={() => { setIsEditMode(!isEditMode); setIsNewMode(false); }}
                  style={{ fontSize: 11, padding: '3px 8px', borderRadius: 6,
                    border: '1px solid ' + (isEditMode ? '#f87171' : '#e2e8f0'),
                    background: isEditMode ? '#fef2f2' : 'white',
                    color: isEditMode ? '#dc2626' : '#64748b', cursor: 'pointer', fontWeight: 500 }}>
                  {isEditMode ? '완료' : '✏️ 편집'}
                </button>
                <button onClick={startNewTemplate}
                  style={{ fontSize: 11, padding: '3px 8px', borderRadius: 6, border: '1px solid #a78bfa',
                    background: '#f5f3ff', color: '#7c3aed', cursor: 'pointer', fontWeight: 600 }}>
                  ＋ 신규
                </button>
              </div>
            </div>
            {Object.entries(templates).map(([k, t]) => (
              <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 4 }}>
                <button onClick={() => { setTmplKey(k); setIsNewMode(false); }}
                  style={{ flex: 1, textAlign: 'left', padding: '9px 12px', borderRadius: 8, border: 'none', cursor: 'pointer',
                    background: !isNewMode && tmplKey === k ? '#ede9fe' : '#f8fafc',
                    color: !isNewMode && tmplKey === k ? '#6d28d9' : '#374151',
                    fontWeight: !isNewMode && tmplKey === k ? 600 : 400, fontSize: 12 }}>
                  {t.label}
                </button>
                {isEditMode && (
                  <button onClick={() => deleteTemplate(k)}
                    style={{ padding: '6px 8px', borderRadius: 6, border: '1px solid #fca5a5', background: '#fef2f2',
                      color: '#dc2626', cursor: 'pointer', fontSize: 13, lineHeight: 1, flexShrink: 0 }}>
                    🗑
                  </button>
                )}
              </div>
            ))}
          </div>

          <div className="card" style={{ padding: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: '#374151', marginBottom: 10 }}>👤 인플루언서 선택</div>
            {/* 검색 입력창 */}
            <div style={{ position: 'relative' }}>
              <input
                value={infSearch}
                onChange={e => { setInfSearch(e.target.value); setShowInfList(true); setSelectedInfId(''); }}
                onFocus={() => setShowInfList(true)}
                onBlur={() => setTimeout(() => setShowInfList(false), 150)}
                placeholder="채널명 검색..."
                style={{ width: '100%', fontSize: 12, padding: '7px 10px', borderRadius: 8, border: '1px solid #e2e8f0', boxSizing: 'border-box' }}
              />
              {/* 검색 드롭다운 */}
              {showInfList && (
                <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: 'white', border: '1px solid #e2e8f0', borderRadius: 8, boxShadow: '0 4px 16px rgba(0,0,0,0.10)', zIndex: 100, maxHeight: 200, overflowY: 'auto', marginTop: 2 }}>
                  {targetInfs
                    .filter(i => !infSearch.trim() || i.channelName.toLowerCase().includes(infSearch.toLowerCase()) || (i.handle || '').toLowerCase().includes(infSearch.toLowerCase()))
                    .slice(0, 20)
                    .map(i => (
                      <div key={i.id}
                        onMouseDown={() => { setSelectedInfId(i.id); setInfSearch(i.channelName); setShowInfList(false); }}
                        style={{ padding: '8px 12px', cursor: 'pointer', fontSize: 12,
                          background: selectedInfId === i.id ? '#ede9fe' : 'white',
                          color: selectedInfId === i.id ? '#6d28d9' : '#374151' }}>
                        <span style={{ fontWeight: 500 }}>{i.channelName}</span>
                        {i.handle && <span style={{ color: '#94a3b8', marginLeft: 6 }}>{i.handle}</span>}
                      </div>
                    ))}
                  {targetInfs.filter(i => !infSearch.trim() || i.channelName.toLowerCase().includes(infSearch.toLowerCase()) || (i.handle || '').toLowerCase().includes(infSearch.toLowerCase())).length === 0 && (
                    <div style={{ padding: '10px 12px', fontSize: 12, color: '#94a3b8' }}>검색 결과 없음</div>
                  )}
                </div>
              )}
            </div>
            {/* 선택된 인플루언서 정보 */}
            {selInf && (
              <div style={{ marginTop: 10, fontSize: 11, color: '#64748b', background: '#f8fafc', borderRadius: 8, padding: '8px 10px' }}>
                <div>📧 {selInf.contactEmail || '이메일 미등록'}</div>
                <div style={{ marginTop: 3 }}>📱 {selInf.contactDM || 'DM 미등록'}</div>
                <div style={{ marginTop: 3 }}>📊 리치아웃: {selInf.outreachStatus}</div>
              </div>
            )}
          </div>

          {/* 캠페인 선택 (일괄 리치아웃) */}
          <div className="card" style={{ padding: 16, marginTop: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: '#374151', marginBottom: 10 }}>🎯 캠페인 일괄 발송</div>
            <select value={selectedCampId} onChange={e => setSelectedCampId(e.target.value)} style={{ width: '100%', fontSize: 12, marginBottom: 10 }}>
              <option value="">-- 캠페인 선택 --</option>
              {campaigns.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            {selectedCampId && (() => {
              var camp = campaigns.find(c => c.id === selectedCampId);
              var campInfs = camp ? influencers.filter(i => (camp.influencerIds || []).includes(i.id)) : [];
              var withEmail = campInfs.filter(i => i.contactEmail);
              return (
                <div>
                  <div style={{ fontSize: 11, color: '#64748b', marginBottom: 8 }}>
                    총 {campInfs.length}명 · 이메일 등록 <b style={{ color: withEmail.length ? '#16a34a' : '#ef4444' }}>{withEmail.length}명</b>
                  </div>
                  <div style={{ maxHeight: 160, overflowY: 'auto', marginBottom: 10 }}>
                    {campInfs.map(i => (
                      <div key={i.id}
                        onClick={() => { setSelectedInfId(i.id); setInfSearch(i.channelName); }}
                        style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                          padding: '6px 10px', borderRadius: 6, marginBottom: 3, cursor: 'pointer',
                          background: selectedInfId === i.id ? '#ede9fe' : '#f8fafc',
                          border: '1px solid ' + (selectedInfId === i.id ? '#c4b5fd' : 'transparent') }}>
                        <span style={{ fontSize: 12, fontWeight: selectedInfId === i.id ? 600 : 400, color: selectedInfId === i.id ? '#6d28d9' : '#374151' }}>{i.channelName}</span>
                        {i.contactEmail
                          ? <span style={{ fontSize: 10, color: '#16a34a' }}>✉</span>
                          : <span style={{ fontSize: 10, color: '#ef4444' }}>미등록</span>}
                      </div>
                    ))}
                  </div>
                  {sendingStatus === 'sending' && bulkProgress.total > 0 ? (
                    <div style={{ width: '100%', padding: '8px 0', borderRadius: 8, background: '#f5f3ff', border: '1px solid #c4b5fd', textAlign: 'center', fontSize: 12, color: '#6d28d9', fontWeight: 600 }}>
                      ⏳ 발송 중... {bulkProgress.current}/{bulkProgress.total}
                    </div>
                  ) : sendingStatus === 'done' && bulkProgress.total > 0 ? (
                    <div style={{ width: '100%', padding: '8px 0', borderRadius: 8, background: '#f0fdf4', border: '1px solid #86efac', textAlign: 'center', fontSize: 12, color: '#16a34a', fontWeight: 600 }}>
                      ✅ {bulkProgress.total}명 발송 완료
                    </div>
                  ) : (
                    <button onClick={sendGmailBulk} disabled={!withEmail.length}
                      style={{ width: '100%', padding: '8px 0', borderRadius: 8, border: 'none',
                        background: withEmail.length ? '#6d28d9' : '#e2e8f0',
                        color: withEmail.length ? 'white' : '#94a3b8',
                        cursor: withEmail.length ? 'pointer' : 'not-allowed', fontSize: 12, fontWeight: 600 }}>
                      ✉️ {withEmail.length}명 일괄 메일 발송
                    </button>
                  )}
                </div>
              );
            })()}
          </div>
        </div>

        {/* 오른쪽: 에디터 */}
        <div>
          {/* 신규 모드: 템플릿 이름 입력 배너 */}
          {isNewMode && (
            <div style={{ background: '#f5f3ff', border: '1px solid #c4b5fd', borderRadius: 10, padding: '12px 16px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: '#6d28d9', whiteSpace: 'nowrap' }}>템플릿 이름</span>
              <input value={newLabel} onChange={e => setNewLabel(e.target.value)}
                placeholder="예) 뷰티 채널 전용 컨택" autoFocus
                style={{ flex: 1, fontSize: 13, padding: '5px 10px', borderRadius: 6, border: '1px solid #c4b5fd' }} />
              <button onClick={saveNewTemplate}
                style={{ padding: '5px 14px', borderRadius: 6, border: 'none', background: '#7c3aed', color: 'white', cursor: 'pointer', fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap' }}>
                💾 저장
              </button>
              <button onClick={() => { setIsNewMode(false); }}
                style={{ padding: '5px 10px', borderRadius: 6, border: '1px solid #e2e8f0', background: 'white', color: '#64748b', cursor: 'pointer', fontSize: 12, whiteSpace: 'nowrap' }}>
                취소
              </button>
            </div>
          )}

          <div className="card" style={{ padding: 18, marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: '#374151' }}>제목</div>
              {!isNewMode && (
                <button onClick={() => copyText(customSubj, 'subj')} style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, border: '1px solid #e2e8f0', background: 'white', cursor: 'pointer', color: copied === 'subj' ? '#16a34a' : '#374151' }}>
                  {copied === 'subj' ? '✅ 복사됨' : '복사'}
                </button>
              )}
            </div>
            <input value={customSubj} onChange={e => setCustomSubj(e.target.value)}
              placeholder={isNewMode ? '이메일 제목을 입력하세요...' : ''}
              style={{ width: '100%' }} />
          </div>

          <div className="card" style={{ padding: 18, marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: '#374151' }}>본문</div>
              {!isNewMode && (
                <button onClick={() => copyText(customBody, 'body')} style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, border: '1px solid #e2e8f0', background: 'white', cursor: 'pointer', color: copied === 'body' ? '#16a34a' : '#374151' }}>
                  {copied === 'body' ? '✅ 복사됨' : '복사'}
                </button>
              )}
            </div>
            <textarea value={customBody} onChange={e => setCustomBody(e.target.value)} rows={16}
              placeholder={isNewMode ? '이메일 본문을 입력하세요...\n\n{{channelName}}, {{category}}, {{followers}}, {{platform}} 변수를 사용하면 인플루언서 선택 시 자동으로 채워집니다.' : ''}
              style={{ width: '100%', fontFamily: 'inherit', fontSize: 13, lineHeight: 1.7 }} />
          </div>

          {isNewMode ? (
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-primary" onClick={saveNewTemplate}>💾 템플릿 저장</button>
              <button className="btn btn-secondary" onClick={() => setIsNewMode(false)}>취소</button>
            </div>
          ) : (
            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
              {sendingStatus === 'sending' && bulkProgress.total === 0 ? (
                <div style={{ padding: '8px 20px', borderRadius: 8, background: '#f5f3ff', border: '1px solid #c4b5fd', fontSize: 13, color: '#6d28d9', fontWeight: 600 }}>⏳ 발송 중...</div>
              ) : sendingStatus === 'done' && bulkProgress.total === 0 ? (
                <div style={{ padding: '8px 20px', borderRadius: 8, background: '#f0fdf4', border: '1px solid #86efac', fontSize: 13, color: '#16a34a', fontWeight: 600 }}>✅ 발송 완료!</div>
              ) : sendingStatus === 'error' ? (
                <div style={{ padding: '8px 20px', borderRadius: 8, background: '#fef2f2', border: '1px solid #fca5a5', fontSize: 13, color: '#dc2626', fontWeight: 600 }}>❌ 발송 실패</div>
              ) : (
                <button className="btn btn-primary" onClick={sendGmailDirect} disabled={!selInf?.contactEmail}>✉️ 메일 발송</button>
              )}
              <button style={{ fontSize: 11, padding: '6px 12px', borderRadius: 6, border: '1px solid #e2e8f0', background: 'white', cursor: 'pointer', color: '#64748b' }}
                onClick={() => { setClientIdInput(gmailClientId); setShowClientIdModal(true); }}
                title="Google Client ID 설정">⚙️ 설정</button>
            </div>
          )}
          {!isNewMode && !selInf?.contactEmail && selInf && (
            <div style={{ marginTop: 10, fontSize: 11, color: '#f59e0b' }}>⚠️ 이메일이 없습니다. 인플루언서 DB에서 contactEmail을 먼저 등록해주세요.</div>
          )}
          {!isNewMode && !gmailClientId && (
            <div style={{ marginTop: 8, fontSize: 11, color: '#6d28d9' }}>💡 메일 발송 전 ⚙️ 설정에서 Google Client ID를 먼저 등록해주세요.</div>
          )}
        </div>
      </div>

      {/* Google Client ID 설정 모달 */}
      {showClientIdModal && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowClientIdModal(false)}>
          <div className="modal" style={{ maxWidth: 500 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <h2 style={{ fontSize: 17, fontWeight: 700 }}>⚙️ Google Client ID 설정</h2>
              <button onClick={() => setShowClientIdModal(false)} style={{ background: 'none', border: 'none', fontSize: 20, color: '#94a3b8', cursor: 'pointer' }}>✕</button>
            </div>
            <div style={{ fontSize: 13, color: '#475569', marginBottom: 14, lineHeight: 1.7 }}>
              Gmail API 직접 발송을 위해 <b>Google Cloud Console</b>에서 OAuth 2.0 Client ID를 발급한 뒤 입력하세요.<br />
              허가된 JavaScript 원본에 <b>http://localhost:포트번호</b>를 추가해야 합니다.
            </div>
            <input
              value={clientIdInput}
              onChange={e => setClientIdInput(e.target.value)}
              placeholder="xxxxxx.apps.googleusercontent.com"
              style={{ width: '100%', marginBottom: 14, fontSize: 13, padding: '8px 12px', borderRadius: 8, border: '1px solid #cbd5e1' }}
            />
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button className="btn btn-secondary" onClick={() => setShowClientIdModal(false)}>취소</button>
              <button className="btn btn-primary" onClick={() => { setGmailClientId(clientIdInput.trim()); setGmailToken(null); setShowClientIdModal(false); }}>저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   CONTRACT PAGE
   ============================================================ */
function ContractPage({ influencers, campaigns, updateInf }) {
  const [fCampaign, setFCampaign] = useState('');
  const campIds = fCampaign ? new Set(campaigns.find(c => c.id === fCampaign)?.influencerIds || []) : null;

/* API 키 관련 오류인지 판별 */
function isKeyError(msg) {
  return /keyInvalid|API key not valid|bad request|400/i.test(msg);
}

const PAGE_SIZE = 20;

function SourcingPage({ onAddToDb }) {
  const [apiKey] = useLS(YT_API_KEY_LS, DEFAULT_YT_KEY);
  const [keyword, setKeyword] = useState('');
  const [category, setCategory] = useState('English education');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [added, setAdded] = useState({});
  const [sortBy, setSortBy] = useState('score_desc');
  const [page, setPage] = useState(0);

  /* 유튜브 채널 검색 (search.list × 2페이지 → channels.list × 청크)
     YouTube search.list 1회 최대 50개 → nextPageToken으로 2회 요청해 최대 100개 수집 */
  async function searchYT() {
    if (!keyword.trim()) return;
    setLoading(true);
    setError('');
    setResults([]);
    setPage(0);
    try {
      const fetchOpts = { referrerPolicy: 'unsafe-url' };
      const q = encodeURIComponent(keyword);
      const BASE = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&maxResults=50&q=${q}&key=${apiKey}`;

      /* ── 1단계: search.list 최대 2회 (50 + 50 = 최대 100개 채널 ID 수집) ── */
      const fetchSearchPage = async (pageToken) => {
        const url = pageToken ? `${BASE}&pageToken=${pageToken}` : BASE;
        const res = await fetch(url, fetchOpts);
        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody?.error?.message || `HTTP ${res.status}`);
        }
        return res.json();
      };

      const page1 = await fetchSearchPage(null);
      const ids1 = (page1.items || []).map(it => it.snippet?.channelId || it.id?.channelId).filter(Boolean);

      let ids2 = [];
      if (page1.nextPageToken) {
        try {
          const page2 = await fetchSearchPage(page1.nextPageToken);
          ids2 = (page2.items || []).map(it => it.snippet?.channelId || it.id?.channelId).filter(Boolean);
        } catch (_) { /* 2페이지 실패 시 1페이지 결과만 사용 */ }
      }

      // 중복 제거 후 합산
      const allIds = [...new Set([...ids1, ...ids2])];
      if (allIds.length === 0) {
        setError('검색 결과가 없습니다. 다른 키워드를 시도해보세요.');
        setLoading(false);
        return;
      }

      /* ── 2단계: channels.list — ID 50개씩 청크 분할 요청 ── */
      const chunkSize = 50;
      const chunks = [];
      for (let i = 0; i < allIds.length; i += chunkSize) {
        chunks.push(allIds.slice(i, i + chunkSize));
      }
      const chunkResults = await Promise.all(chunks.map(async (chunk) => {
        const chUrl = `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${chunk.join(',')}&key=${apiKey}`;
        const res = await fetch(chUrl, fetchOpts);
        const data = await res.json();
        return data.items || [];
      }));
      const chItems = chunkResults.flat();

      /* ── 3단계: 채널 데이터 → 인플루언서 객체 변환 ── */
      // 원본 search 순위 복원을 위한 인덱스 맵
      const rankMap = {};
      allIds.forEach((id, i) => { rankMap[id] = i; });

      const list = chItems.map(ch => {
        const stats = ch.statistics || {};
        const followers = stats.hiddenSubscriberCount ? 0 : parseInt(stats.subscriberCount || '0');
        const totalViews = parseInt(stats.viewCount || '0');
        const videoCount = parseInt(stats.videoCount || '1') || 1;
        const avgViews = Math.round(totalViews / videoCount);
        const inf = {
          channelName: ch.snippet.title,
          handle: ch.snippet.customUrl || ('@' + ch.snippet.title.replace(/\s/g, '')),
          platform: 'yt_long',
          followers,
          avgViews,
          category,
          url: `https://www.youtube.com/channel/${ch.id}`,
          contactEmail: '',
          contactDM: '',
          note: '',
          dbStatus: 'Hold (3순위)',
          tier: followers >= 100000 ? 'Macro' : followers >= 10000 ? 'Micro' : 'Nano',
          _ytId: ch.id,
          _rank: rankMap[ch.id] ?? 999, // 원본 키워드 연관 순위
          _desc: ch.snippet.description || '',
          _thumb: ch.snippet.thumbnails?.default?.url || '',
        };
        inf._email = extractEmail(inf._desc);
        if (inf._email) inf.contactEmail = inf._email;
        inf._score = calcScore(inf);
        return inf;
      });

      // _rank 기준 정렬 (기본 순서 = 키워드 연관 높은 순)
      list.sort((a, b) => a._rank - b._rank);
      setResults(list);
    } catch (e) {
      setError(e.message || '오류가 발생했습니다.');
    }
    setLoading(false);
  }

  function handleAdd(ch) {
    const newInf = {
      id: 'inf_yt_' + ch._ytId + '_' + Math.random().toString(36).slice(2,6),
      channelName:   ch.channelName,
      handle:        ch.handle,
      platform:      ch.platform,
      followers:     ch.followers,
      avgViews:      ch.avgViews,
      category:      ch.category,
      dbStatus:      ch._score >= 70 ? 'Selected (1순위)' : ch._score >= 50 ? 'Reserved (2순위)' : 'Hold (3순위)',
      note:          ch._desc,
      contactEmail:  ch.contactEmail || ch._email || extractEmail(ch._desc) || '',
      contactDM:     '',
      tier:          ch.tier,
      url:           ch.url,
      outreachStatus: '미컨택', outreachDate: '', outreachNote: '',
      contractStatus: '미발송', contractDate: '', contractAmount: '', contractNote: '',
      contentStatus:  '미시작', contentUrl: '', contentUploadDate: '', contentNote: '',
      views: '', clicks: '', conversions: '',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    onAddToDb(newInf);
    setAdded(prev => ({ ...prev, [ch._ytId]: true }));
  }

  const scoreColor = s => s >= 70 ? '#16a34a' : s >= 50 ? '#ca8a04' : '#dc2626';

  /* 정렬 옵션 */
  const SORT_OPTIONS = [
    { value: 'score_desc',      label: '점수 높은 순' },
    { value: 'score_asc',       label: '점수 낮은 순' },
    { value: 'relevance_desc',  label: '키워드 연관 높은 순' },
    { value: 'relevance_asc',   label: '키워드 연관 낮은 순' },
  ];

  const sortedResults = useMemo(() => {
    const arr = [...results];
    if      (sortBy === 'score_desc')     arr.sort((a, b) => b._score - a._score);
    else if (sortBy === 'score_asc')      arr.sort((a, b) => a._score - b._score);
    else if (sortBy === 'relevance_desc') arr.sort((a, b) => a._rank  - b._rank);
    else if (sortBy === 'relevance_asc')  arr.sort((a, b) => b._rank  - a._rank);
    return arr;
  }, [results, sortBy]);

  const totalPages = Math.ceil(sortedResults.length / PAGE_SIZE);
  const pagedResults = sortedResults.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  return (
    <div style={{ padding: '28px 32px', maxWidth: 1100 }}>
      <div className="section-title">🔍 YouTube 인플루언서 소싱</div>
      <div className="section-sub">키워드로 유튜브 채널을 검색하고 MD 기준 점수를 자동 계산합니다.</div>

      {/* 검색 바 */}
      <div className="filter-bar" style={{ gap: 10, marginBottom: 20 }}>
        <input
          value={keyword} onChange={e => setKeyword(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && searchYT()}
          placeholder="키워드 입력 (예: 영어교육, 엄마표, 해외생활, English speaking)"
          style={{ flex: 1, minWidth: 220 }}
        />
        <select value={category} onChange={e => setCategory(e.target.value)} style={{ minWidth: 150 }}>
          {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
        <button className="btn btn-primary" onClick={searchYT} disabled={loading}>
          {loading ? '검색 중...' : '🔍 검색'}
        </button>
      </div>

      {error && (
        <div style={{ background: '#fee2e2', border: '1px solid #fecaca', borderRadius: 10, padding: '12px 16px', marginBottom: 16, fontSize: 13, color: '#dc2626' }}>
          ⚠️ {error}
        </div>
      )}

      {loading && (
        <div className="card" style={{ padding: 40, textAlign: 'center', color: '#6366f1' }}>
          <div style={{ fontSize: 24, marginBottom: 8 }}>⏳</div>
          <div style={{ fontSize: 14, fontWeight: 500 }}>YouTube API에서 채널 정보를 가져오는 중...</div>
        </div>
      )}

      {results.length > 0 && (
        <div>
          {/* 결과 헤더: 건수 + 정렬 */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <div style={{ fontSize: 13, color: '#64748b' }}>
              검색 결과 <strong style={{ color: '#374151' }}>{results.length}개</strong>
              {' '}· 현재 <strong style={{ color: '#6366f1' }}>{page + 1} / {totalPages}</strong> 페이지
              {results.some(r => isBrandChannel(r.channelName, r._desc)) && (
                <span style={{ marginLeft: 8, color: '#dc2626', fontSize: 11, fontWeight: 600 }}>
                  🚫 브랜드/기관 채널 {results.filter(r => isBrandChannel(r.channelName, r._desc)).length}개 감지
                </span>
              )}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 12, color: '#64748b' }}>정렬</span>
              <select
                value={sortBy}
                onChange={e => { setSortBy(e.target.value); setPage(0); }}
                style={{ fontSize: 12, padding: '5px 10px', borderRadius: 8, border: '1px solid #e2e8f0', background: 'white', color: '#374151', cursor: 'pointer' }}
              >
                {SORT_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
            </div>
          </div>

          {/* 결과 목록 (페이지당 20개) */}
          <div style={{ display: 'grid', gap: 12 }}>
            {pagedResults.map((ch) => (
              <div key={ch._ytId} className="card" style={{ padding: '16px 20px', display: 'flex', alignItems: 'center', gap: 14 }}>
                {/* 썸네일 */}
                {ch._thumb
                  ? <img src={ch._thumb} alt="" style={{ width: 48, height: 48, borderRadius: 24, objectFit: 'cover', flexShrink: 0 }} />
                  : <div style={{ width: 48, height: 48, borderRadius: 24, background: '#e5e7eb', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20 }}>📹</div>
                }

                {/* 채널 정보 */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{ch.channelName}</div>
                    <span style={{ fontSize: 11, color: '#64748b' }}>{ch.handle}</span>
                    <a href={ch.url} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: '#6366f1' }}>↗ 채널</a>
                  </div>
                  <div style={{ display: 'flex', gap: 12, fontSize: 12, color: '#64748b', flexWrap: 'wrap' }}>
                    <span>👥 {fmt(ch.followers)} 구독</span>
                    <span>👁️ 평균 {fmt(ch.avgViews)} 조회</span>
                    <span>📂 {ch.category}</span>
                    <span style={{ color: ch.tier === 'Macro' ? '#7c3aed' : ch.tier === 'Micro' ? '#2563eb' : '#64748b' }}>🏷️ {ch.tier}</span>
                  </div>
                  {/* 이메일 — 있을 경우 강조 표시 */}
                  {ch._email && (
                    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 5, marginTop: 5,
                      background: '#ecfdf5', border: '1px solid #6ee7b7', borderRadius: 7,
                      padding: '3px 9px', fontSize: 12, color: '#065f46', fontWeight: 600 }}>
                      📧 {ch._email}
                    </div>
                  )}
                  {/* 채널 설명 (앞 120자 미리보기) */}
                  {ch._desc && (
                    <div style={{ fontSize: 11, color: '#94a3b8', marginTop: 4,
                      overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                      {ch._desc.slice(0, 120)}
                    </div>
                  )}
                </div>

                {/* 점수 */}
                <div style={{ textAlign: 'center', minWidth: 70 }}>
                  {ch._score === 0 && isBrandChannel(ch.channelName, ch._desc) ? (
                    <div style={{ fontSize: 11, fontWeight: 700, color: '#dc2626', background: '#fee2e2',
                      borderRadius: 8, padding: '6px 8px', border: '1px solid #fecaca' }}>
                      🚫<br/>브랜드<br/>제외
                    </div>
                  ) : (
                    <>
                      <div style={{ fontSize: 22, fontWeight: 700, color: scoreColor(ch._score) }}>{ch._score}</div>
                      <div style={{ fontSize: 10, color: '#94a3b8' }}>/ 100</div>
                      <div style={{ fontSize: 10, fontWeight: 600, color: scoreColor(ch._score), marginTop: 2 }}>
                        {ch._score >= 70 ? '✅ Selected' : ch._score >= 50 ? '⚡ Reserved' : '⏸ Hold'}
                      </div>
                    </>
                  )}
                </div>

                {/* DB 추가 버튼 */}
                <div style={{ minWidth: 90 }}>
                  {added[ch._ytId]
                    ? <div style={{ fontSize: 12, color: '#16a34a', fontWeight: 600, textAlign: 'center' }}>✅ DB 추가됨</div>
                    : <button className="btn btn-primary" style={{ fontSize: 12, width: '100%' }} onClick={() => handleAdd(ch)}>+ DB 추가</button>
                  }
                </div>
              </div>
            ))}
          </div>

          {/* 페이지네이션 */}
          {totalPages > 1 && (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, marginTop: 20 }}>
              {/* 페이지 위치 표시 */}
              <div style={{ fontSize: 13, fontWeight: 600, color: '#374151' }}>
                <span style={{ color: '#6366f1', fontSize: 15 }}>{page + 1}</span>
                <span style={{ color: '#94a3b8' }}> / {totalPages} 페이지</span>
                <span style={{ color: '#94a3b8', fontWeight: 400, marginLeft: 8, fontSize: 12 }}>
                  ({sortedResults.length}개 결과)
                </span>
              </div>

              {/* 버튼 행 */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                {/* 맨 앞 << */}
                <button
                  className="btn btn-secondary"
                  onClick={() => setPage(0)}
                  disabled={page === 0}
                  title="맨 앞으로"
                  style={{ fontSize: 13, padding: '6px 10px', opacity: page === 0 ? 0.35 : 1, fontWeight: 700 }}
                >
                  «
                </button>
                {/* 이전 */}
                <button
                  className="btn btn-secondary"
                  onClick={() => setPage(p => Math.max(0, p - 1))}
                  disabled={page === 0}
                  style={{ fontSize: 12, padding: '6px 12px', opacity: page === 0 ? 0.35 : 1 }}
                >
                  ‹ 이전
                </button>

                {/* 페이지 번호 버튼 (최대 7개 표시, 현재 페이지 중심) */}
                {(() => {
                  const WINDOW = 3; // 현재 페이지 양쪽 3개씩
                  const start = Math.max(0, Math.min(page - WINDOW, totalPages - WINDOW * 2 - 1));
                  const end   = Math.min(totalPages, start + WINDOW * 2 + 1);
                  return Array.from({ length: end - start }, (_, k) => start + k).map(i => (
                    <button
                      key={i}
                      onClick={() => setPage(i)}
                      style={{
                        width: 32, height: 32, borderRadius: 8, border: 'none', cursor: 'pointer',
                        fontSize: 12, fontWeight: i === page ? 700 : 500,
                        background: i === page ? '#6366f1' : '#f1f5f9',
                        color: i === page ? 'white' : '#374151',
                        boxShadow: i === page ? '0 2px 8px rgba(99,102,241,0.35)' : 'none',
                      }}
                    >
                      {i + 1}
                    </button>
                  ));
                })()}

                {/* 다음 */}
                <button
                  className="btn btn-secondary"
                  onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))}
                  disabled={page === totalPages - 1}
                  style={{ fontSize: 12, padding: '6px 12px', opacity: page === totalPages - 1 ? 0.35 : 1 }}
                >
                  다음 ›
                </button>
                {/* 맨 뒤 >> */}
                <button
                  className="btn btn-secondary"
                  onClick={() => setPage(totalPages - 1)}
                  disabled={page === totalPages - 1}
                  title="맨 뒤로"
                  style={{ fontSize: 13, padding: '6px 10px', opacity: page === totalPages - 1 ? 0.35 : 1, fontWeight: 700 }}
                >
                  »
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {!loading && results.length === 0 && !error && (
        <div className="empty-state">
          <div style={{ fontSize: 40, marginBottom: 12 }}>🔍</div>
          <div style={{ fontWeight: 600, color: '#64748b', marginBottom: 6 }}>키워드로 유튜브 채널을 검색하세요</div>
          <div style={{ fontSize: 12, color: '#94a3b8' }}>예: "영어 공부", "엄마표 영어", "영어 브이로그", "해외살이"</div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   CAMPAIGN MANAGEMENT PAGE
   ============================================================ */
function CampaignPage({ influencers, campaigns, setCampaigns, updateInf }) {
  const [view2, setView2] = useState('list'); // 'list' | 'create' | 'detail'
  const [selected, setSelected] = useState(new Set());
  const [campaignName, setCampaignName] = useState('');
  const [campaignGoal, setCampaignGoal] = useState('');
  const [campaignBudget, setCampaignBudget] = useState('');
  const [campaignDeadline, setCampaignDeadline] = useState('');
  const [detailId, setDetailId] = useState(null);
  const [search, setSearch] = useState('');

  /* 캠페인 상세 뷰 전용 상태 */
  const [campInfDetailId, setCampInfDetailId] = useState(null); // 사이드 패널 열린 인플루언서 ID
  const [editMode, setEditMode] = useState(false);              // 편집(삭제) 모드
  const [editSelected, setEditSelected] = useState(new Set()); // 삭제 선택된 ID들
  const [campEditingEmail, setCampEditingEmail] = useState(false);
  const [campEmailDraft, setCampEmailDraft] = useState('');

  const CAMPAIGN_STATUSES = ['기획 중', '진행 중', '완료', '보류'];

  /* 신규 캠페인 저장 */
  function handleCreateCampaign() {
    if (!campaignName.trim() || selected.size === 0) return;
    const now = new Date().toISOString();
    const newCamp = {
      id: 'camp_' + Date.now(),
      name: campaignName,
      goal: campaignGoal,
      budget: campaignBudget,
      deadline: campaignDeadline,
      status: '기획 중',
      influencerIds: [...selected],
      createdAt: now,
      updatedAt: now,
      note: '',
    };
    setCampaigns(prev => [...prev, newCamp]);
    setCampaignName(''); setCampaignGoal(''); setCampaignBudget(''); setCampaignDeadline('');
    setSelected(new Set());
    setView2('list');
  }

  const detailCampaign = campaigns.find(c => c.id === detailId);
  const campInfs = detailCampaign
    ? influencers.filter(i => detailCampaign.influencerIds.includes(i.id))
    : [];

  const filteredInf = influencers.filter(i =>
    (i.dbStatus === 'Selected (1순위)' || i.dbStatus === 'Reserved (2순위)') &&
    (i.channelName.toLowerCase().includes(search.toLowerCase()) || (i.handle || '').toLowerCase().includes(search.toLowerCase()))
  );

  if (view2 === 'detail' && detailCampaign) {
    const campInfDetail = campInfs.find(i => i.id === campInfDetailId);

    /* 편집 모드: 전체 선택 토글 */
    function toggleAllEdit() {
      if (editSelected.size === campInfs.length) setEditSelected(new Set());
      else setEditSelected(new Set(campInfs.map(i => i.id)));
    }

    /* 캠페인에서 선택된 인플루언서 제거 */
    function removeSelected() {
      if (editSelected.size === 0) return;
      if (!confirm(`선택한 ${editSelected.size}명을 이 캠페인에서 제거할까요?\n(인플루언서 DB에서는 삭제되지 않습니다)`)) return;
      setCampaigns(prev => prev.map(c =>
        c.id === detailCampaign.id
          ? { ...c, influencerIds: c.influencerIds.filter(id => !editSelected.has(id)) }
          : c
      ));
      setEditSelected(new Set());
      setEditMode(false);
      if (campInfDetailId && editSelected.has(campInfDetailId)) setCampInfDetailId(null);
    }

    return (
      <div style={{ paddingRight: campInfDetail ? 400 : 0, transition: 'padding-right 0.2s' }}>
        <div style={{ padding: '28px 32px' }}>
          {/* 헤더 */}
          <button className="btn btn-secondary" style={{ marginBottom: 20, fontSize: 12 }}
            onClick={() => { setView2('list'); setEditMode(false); setEditSelected(new Set()); setCampInfDetailId(null); }}>
            ← 목록으로
          </button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
            <div className="section-title">{detailCampaign.name}</div>
            <select value={detailCampaign.status}
              onChange={e => setCampaigns(prev => prev.map(c => c.id === detailCampaign.id ? { ...c, status: e.target.value } : c))}
              style={{ fontSize: 12, padding: '4px 8px', borderRadius: 6 }}>
              {CAMPAIGN_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div style={{ fontSize: 12, color: '#64748b', marginBottom: 20 }}>
            {detailCampaign.goal && <span style={{ marginRight: 16 }}>🎯 {detailCampaign.goal}</span>}
            {detailCampaign.budget && <span style={{ marginRight: 16 }}>💰 {detailCampaign.budget}</span>}
            {detailCampaign.deadline && <span>📅 {detailCampaign.deadline}</span>}
          </div>

          {/* 인플루언서 테이블 */}
          <div className="card" style={{ overflow: 'hidden', marginBottom: 16 }}>
            <div style={{ padding: '14px 18px', borderBottom: '1px solid #f1f5f9', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>👥 참여 인플루언서 ({campInfs.length}명)</div>
              <div style={{ display: 'flex', gap: 8 }}>
                {editMode ? (
                  <>
                    <span style={{ fontSize: 12, color: '#64748b', alignSelf: 'center' }}>{editSelected.size}명 선택</span>
                    <button className="btn btn-secondary" style={{ fontSize: 12 }} onClick={toggleAllEdit}>
                      {editSelected.size === campInfs.length ? '전체 해제' : '전체 선택'}
                    </button>
                    <button className="btn btn-danger" style={{ fontSize: 12 }} onClick={removeSelected} disabled={editSelected.size === 0}>
                      🗑 삭제 ({editSelected.size})
                    </button>
                    <button className="btn btn-secondary" style={{ fontSize: 12 }} onClick={() => { setEditMode(false); setEditSelected(new Set()); }}>
                      취소
                    </button>
                  </>
                ) : (
                  <button className="btn btn-secondary" style={{ fontSize: 12 }} onClick={() => setEditMode(true)}>
                    ✏️ 편집
                  </button>
                )}
              </div>
            </div>
            <table>
              <thead>
                <tr>
                  {editMode && <th style={{ width: 36 }}></th>}
                  <th>#</th>
                  <th>채널명</th>
                  <th>플랫폼</th>
                  <th>카테고리</th>
                  <th>구독/팔로워</th>
                  <th>스코어</th>
                  <th>리치아웃</th>
                  <th>계약</th>
                  <th>콘텐츠</th>
                </tr>
              </thead>
              <tbody>
                {campInfs.map((inf, idx) => (
                  <tr key={inf.id}
                    style={{ cursor: editMode ? 'default' : 'pointer',
                      background: campInfDetailId === inf.id ? '#f5f3ff' : editSelected.has(inf.id) ? '#fef2f2' : 'transparent' }}
                    onClick={() => { if (!editMode) { setCampInfDetailId(prev => prev === inf.id ? null : inf.id); setCampEditingEmail(false); } }}>
                    {editMode && (
                      <td onClick={e => e.stopPropagation()}>
                        <input type="checkbox" checked={editSelected.has(inf.id)}
                          onChange={() => setEditSelected(prev => {
                            const next = new Set(prev);
                            next.has(inf.id) ? next.delete(inf.id) : next.add(inf.id);
                            return next;
                          })}
                          style={{ cursor: 'pointer', width: 15, height: 15 }} />
                      </td>
                    )}
                    <td style={{ color: '#94a3b8', fontSize: 12 }}>{idx + 1}</td>
                    <td>
                      <div style={{ fontWeight: 600, fontSize: 13 }}>{inf.channelName}</div>
                      <div style={{ fontSize: 11, color: '#94a3b8' }}>{inf.handle}</div>
                    </td>
                    <td><PBadge platform={inf.platform} /></td>
                    <td style={{ fontSize: 12, color: '#64748b' }}>{inf.category || '—'}</td>
                    <td style={{ fontSize: 12 }}>{fmt(inf.followers)}</td>
                    <td><ScoreBar score={calcScore(inf)} /></td>
                    <td onClick={e => e.stopPropagation()}>
                      <StageSelect value={inf.outreachStatus} options={OUTREACH_STAGES} onChange={v => updateInf(inf.id, { outreachStatus: v })} small />
                    </td>
                    <td onClick={e => e.stopPropagation()}>
                      <StageSelect value={inf.contractStatus} options={CONTRACT_STAGES} onChange={v => updateInf(inf.id, { contractStatus: v })} small />
                    </td>
                    <td onClick={e => e.stopPropagation()}>
                      <StageSelect value={inf.contentStatus} options={CONTENT_STAGES} onChange={v => updateInf(inf.id, { contentStatus: v })} small />
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* 캠페인 메모 */}
          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8, color: '#374151' }}>메모</div>
            <textarea
              value={detailCampaign.note || ''}
              onChange={e => setCampaigns(prev => prev.map(c => c.id === detailCampaign.id ? { ...c, note: e.target.value } : c))}

                      placeholder="이메일 주소 입력" style={{ flex: 1, fontSize: 12, padding: '5px 9px' }} />
                    <button onClick={() => { updateInf(campInfDetail.id, { contactEmail: campEmailDraft }); setCampEditingEmail(false); }}

            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="채널명 검색..." style={{ fontSize: 12, padding: '5px 10px', width: 180 }} />
          </div>
          <div style={{ maxHeight: 400, overflowY: 'auto' }}>
            {filteredInf.length === 0 ? (
              <div className="empty-state" style={{ padding: 30 }}>인플루언서 DB에서 Selected/Reserved 채널을 먼저 등록해주세요.</div>
            ) : (
              <table>
                <thead><tr>
                  <th style={{ width: 40 }}><input type="checkbox" checked={filteredInf.every(i => selected.has(i.id))} onChange={e => {
                    if (e.target.checked) setSelected(new Set(filteredInf.map(i => i.id)));
                    else setSelected(new Set());
                  }} /></th>
                  <th>채널명</th><th>플랫폼</th><th>카테고리</th><th>구독자</th><th>점수</th>
                </tr></thead>
                <tbody>
                  {filteredInf.map(inf => (
                    <tr key={inf.id} onClick={() => setSelected(prev => { const n = new Set(prev); n.has(inf.id) ? n.delete(inf.id) : n.add(inf.id); return n; })} style={{ cursor: 'pointer' }}>
                      <td><input type="checkbox" checked={selected.has(inf.id)} onChange={() => {}} /></td>
                      <td style={{ fontWeight: 500 }}>{inf.channelName}</td>
                      <td><PBadge platform={inf.platform} /></td>
                      <td style={{ fontSize: 12, color: '#64748b' }}>{inf.category || '—'}</td>

                  ))}

              </table>
            )}
          </div>
        </div>

        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn btn-primary" onClick={handleCreateCampaign} disabled={!campaignName.trim() || selected.size === 0}>

          <button className="btn btn-secondary" onClick={() => setView2('list')}>취소</button>
        </div>
      </div>
    );
  }

  /* 캠페인 목록 */
  const CAMP_COLORS = { '기획 중': { bg: '#ede9fe', color: '#6d28d9' }, '진행 중': { bg: '#dcfce7', color: '#15803d' }, '완료': { bg: '#dbeafe', color: '#1d4ed8' }, '보류': { bg: '#f3f4f6', color: '#6b7280' } };

  return (
    <div style={{ padding: '28px 32px', maxWidth: 1000 }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 22 }}>
        <div>
          <div className="section-title">🚀 캠페인 관리</div>
          <div className="section-sub">인플루언서를 묶어 캠페인을 생성하고 진행 상황을 추적합니다.</div>

          <div style={{ fontSize: 12, color: '#94a3b8' }}>오른쪽 위의 '새 캠페인' 버튼을 눌러 첫 캠페인을 만들어보세요.</div>

      ) : (
        <div style={{ display: 'grid', gap: 14 }}>
          {campaigns.map(camp => {
            const campInfsLocal = influencers.filter(i => camp.influencerIds.includes(i.id));

            const uploaded = campInfsLocal.filter(i => ['업로드 완료','검수 완료','승인'].includes(i.contentStatus)).length;
            const sc2 = CAMP_COLORS[camp.status] || { bg: '#f3f4f6', color: '#374151' };
            return (
              <div key={camp.id} className="card" style={{ padding: '18px 22px', cursor: 'pointer' }} onClick={() => { setDetailId(camp.id); setView2('detail'); }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>{camp.name}</div>
                      <span className="badge" style={{ background: sc2.bg, color: sc2.color }}>{camp.status}</span>
                    </div>
                    <div style={{ display: 'flex', gap: 16, fontSize: 12, color: '#64748b', flexWrap: 'wrap' }}>
                      <span>👥 인플루언서 {campInfsLocal.length}명</span>
                      {camp.goal && <span>🎯 {camp.goal}</span>}
                      {camp.budget && <span>💰 {camp.budget}</span>}
                      {camp.deadline && <span>📅 마감 {camp.deadline}</span>}
                    </div>
                  </div>
                  <div style={{ display: 'flex', gap: 20, textAlign: 'center' }}>
                    <div><div style={{ fontSize: 18, fontWeight: 700, color: '#2563eb' }}>{contracted}</div><div style={{ fontSize: 10, color: '#64748b' }}>계약완료</div></div>
                    <div><div style={{ fontSize: 18, fontWeight: 700, color: '#16a34a' }}>{uploaded}</div><div style={{ fontSize: 10, color: '#64748b' }}>업로드</div></div>
                  </div>
                </div>
                <div style={{ marginTop: 12, height: 4, background: '#f1f5f9', borderRadius: 2, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: campInfsLocal.length > 0 ? (uploaded / campInfsLocal.length * 100) + '%' : '0%', background: '#16a34a', borderRadius: 2, transition: 'width 0.3s' }} />
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

  return (
    <div style={{ padding: '28px 32px', maxWidth: 1000 }}>
      <div className="section-title">✉️ 아웃리치 자동화</div>
      <div className="section-sub">인플루언서별 맞춤 이메일 템플릿을 생성하고 Gmail로 전송합니다.</div>

      <div style={{ display: 'grid', gridTemplateColumns: '280px 1fr', gap: 20 }}>
        {/* 왼쪽: 설정 */}
        <div>
          {/* 템플릿 선택 */}
          <div className="card" style={{ padding: 16, marginBottom: 14 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: '#374151', marginBottom: 10 }}>📝 템플릿 선택</div>
            {Object.entries(TEMPLATES).map(([k, t]) => (
              <button key={k} onClick={() => setTmplKey(k)}
                style={{ display: 'block', width: '100%', textAlign: 'left', padding: '9px 12px', borderRadius: 8, border: 'none', cursor: 'pointer', marginBottom: 4,
                  background: tmplKey === k ? '#ede9fe' : '#f8fafc', color: tmplKey === k ? '#6d28d9' : '#374151', fontWeight: tmplKey === k ? 600 : 400, fontSize: 12 }}>
                {t.label}
              </button>
            ))}
          </div>

          {/* 인플루언서 선택 */}
          <div className="card" style={{ padding: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: '#374151', marginBottom: 10 }}>👤 인플루언서 선택</div>
            <select value={selectedInfId} onChange={e => setSelectedInfId(e.target.value)} style={{ width: '100%', fontSize: 12 }}>
              <option value="">-- 선택 --</option>
              {targetInfs.map(i => <option key={i.id} value={i.id}>{i.channelName}</option>)}
            </select>
            {selInf && (
              <div style={{ marginTop: 10, fontSize: 11, color: '#64748b' }}>
                <div>📧 {selInf.contactEmail || '이메일 미등록'}</div>
                <div>📱 {selInf.contactDM || 'DM 미등록'}</div>
                <div>📊 리치아웃: {selInf.outreachStatus}</div>
              </div>
            )}
          </div>
        </div>

        {/* 오른쪽: 에디터 */}
        <div>
          <div className="card" style={{ padding: 18, marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: '#374151' }}>제목</div>
              <button onClick={() => copy(customSubj, 'subj')} style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, border: '1px solid #e2e8f0', background: 'white', cursor: 'pointer', color: copied === 'subj' ? '#16a34a' : '#374151' }}>
                {copied === 'subj' ? '✅ 복사됨' : '복사'}
              </button>
            </div>
            <input value={customSubj} onChange={e => setCustomSubj(e.target.value)} style={{ width: '100%' }} />
          </div>

          <div className="card" style={{ padding: 18, marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: '#374151' }}>본문</div>
              <button onClick={() => copy(customBody, 'body')} style={{ fontSize: 11, padding: '3px 10px', borderRadius: 6, border: '1px solid #e2e8f0', background: 'white', cursor: 'pointer', color: copied === 'body' ? '#16a34a' : '#374151' }}>
                {copied === 'body' ? '✅ 복사됨' : '복사'}
              </button>
            </div>
            <textarea value={customBody} onChange={e => setCustomBody(e.target.value)} rows={16} style={{ width: '100%', fontFamily: 'inherit', fontSize: 13, lineHeight: 1.7 }} />
          </div>

          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn btn-primary" onClick={openGmail}>
              📨 Gmail로 열기
            </button>
            <button className="btn btn-secondary" onClick={() => copy(customSubj + '\n\n' + customBody, 'all')}>
              {copied === 'all' ? '✅ 모두 복사됨' : '📋 전체 복사'}
            </button>
          </div>
          {!selInf?.contactEmail && selInf && (
            <div style={{ marginTop: 10, fontSize: 11, color: '#f59e0b' }}>⚠️ 이메일이 없습니다. 인플루언서 DB에서 contactEmail을 먼저 등록해주세요.</div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */
function App() {
  const [influencers, setInfluencers] = useLS('speak_hub_v2', []);
  const [campaigns, setCampaigns] = useLS('speak_campaigns_v1', []);
  const [view, setView] = useState('dashboard');

  const updateInf = useCallback((id, updates) => {
    setInfluencers(prev =>
      prev.map(i => i.id === id ? { ...i, ...updates, updatedAt: new Date().toISOString() } : i)
    );
  }, []);

  const deleteInf = useCallback((id) => {
    setInfluencers(prev => prev.filter(i => i.id !== id));
  }, []);

  /* 다중 삭제 */
  const bulkDeleteInf = useCallback((ids) => {
    setInfluencers(prev => prev.filter(i => !ids.has(i.id)));
  }, []);

  /* 소싱 페이지에서 단건 인플루언서 추가 */
  const addSingleInf = useCallback((newInf) => {
    setInfluencers(prev => {
      const exists = prev.some(i => i.handle === newInf.handle || i.channelName === newInf.channelName);
      if (exists) return prev.map(i => (i.handle === newInf.handle || i.channelName === newInf.channelName) ? { ...i, ...newInf, id: i.id } : i);
      return [...prev, newInf];
    });
  }, []);

  const handleImport = useCallback((newData) => {
    setInfluencers(prev => {
      // 기존 인플루언서 맵 (handle 또는 channelName 기준)
      const existMap = {};
      prev.forEach(i => { existMap[i.handle || i.channelName] = i; });
      // 새 데이터 처리: 중복이면 워크플로우 상태 보존하며 업데이트, 신규면 추가
      const updated = { ...existMap };
      newData.forEach(nd => {
        const key = nd.handle || nd.channelName;
        const ex = existMap[key];
        if (ex) {
          // 기존 항목 업데이트 (워크플로우 상태 보존, source는 csv 유지)
          updated[key] = { ...ex, ...nd, id: ex.id, source: 'csv',
            outreachStatus: ex.outreachStatus, outreachDate: ex.outreachDate, outreachNote: ex.outreachNote,
            contractStatus: ex.contractStatus, contractDate: ex.contractDate, contractAmount: ex.contractAmount, contractNote: ex.contractNote,
            contentStatus: ex.contentStatus, contentUrl: ex.contentUrl, contentUploadDate: ex.contentUploadDate, contentNote: ex.contentNote,
            views: ex.views, clicks: ex.clicks, conversions: ex.conversions,
          };
        } else {
          // 신규 항목 추가
          updated[key] = { ...nd, source: 'csv' };
        }
      });
      // 기존 순서 보존 + 신규 항목 뒤에 추가
      const existKeys = prev.map(i => i.handle || i.channelName);
      const newKeys = Object.keys(updated).filter(k => !existKeys.includes(k));
      return [
        ...prev.map(i => updated[i.handle || i.channelName] || i),
        ...newKeys.map(k => updated[k]),
      ];
    });
  }, []);

  const stats = useMemo(() => ({
    total: influencers.length,
    outreachActive: influencers.filter(i => !['미컨택','거절'].includes(i.outreachStatus)).length,
    contracted: influencers.filter(i => i.contractStatus === '서명 완료').length,
    contentActive: influencers.filter(i => !['미시작'].includes(i.contentStatus) && i.contractStatus === '서명 완료').length,
    campaignCount: campaigns.length,
  }), [influencers, campaigns]);

  const pages = {
    dashboard: <Dashboard influencers={influencers} />,
    sourcing:  <SourcingPage onAddToDb={addSingleInf} />,
    campaigns: <CampaignPage influencers={influencers} campaigns={campaigns} setCampaigns={setCampaigns} updateInf={updateInf} />,
    db:        <InfluencerDB influencers={influencers} updateInf={updateInf} onImport={handleImport} onDelete={deleteInf} onBulkDelete={bulkDeleteInf} />,
    outreach:  <OutreachPage influencers={influencers} campaigns={campaigns} updateInf={updateInf} />,
    contract:  <ContractPage influencers={influencers} campaigns={campaigns} updateInf={updateInf} />,
    content:   <ContentPage influencers={influencers} campaigns={campaigns} updateInf={updateInf} />,
    analytics: <AnalyticsPage influencers={influencers} campaigns={campaigns} />,
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      <Sidebar view={view} setView={setView} stats={stats} />
      <div style={{ marginLeft: 230, flex: 1, minHeight: '100vh', overflow: 'auto' }}>
        {pages[view]}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
